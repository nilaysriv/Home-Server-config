version: '3.8'

services:

  # --- 1. Nextcloud Database ---
  db:
    image: mariadb:10.6
    container_name: nextcloud-setup-db-1
    restart: always
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    volumes:
      - /mnt/data/nextcloud/db:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=strongpassword123
      - MYSQL_PASSWORD=strongpassword123
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud

  # --- 2. Nextcloud Application (HTTP 8080) ---
  app:
    image: nextcloud
    container_name: nextcloud-setup-app-1
    restart: always
    ports:
      - '8080:80' # Exposed on original HTTP port
    volumes:
      - /mnt/data/nextcloud/html:/var/www/html
      - /mnt/data/nextcloud/data:/var/www/html/data
    environment:
      - MYSQL_PASSWORD=strongpassword123
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=db
      # NO PROXY ENVIRONMENT VARIABLES HERE
    depends_on:
      - db

  # --- 3. AI Chatbot Backend ---
  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: always
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - /mnt/data/ai/ollama:/root/.ollama

  # --- 4. AI Chatbot Frontend (HTTP 3000) ---
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    ports:
      - '3000:8080' # Exposed on original HTTP port
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - /mnt/data/ai/open-webui:/app/backend/data
    depends_on:
      - ollama

# --- 5. Dashy Dashboard ---
  dashy:
    image: lissy93/dashy:latest
    container_name: dashy
    restart: unless-stopped
    ports:
      # Host Port 8663 -> Container Port 8080 (Dashy's default)
      - "8663:8080"
    volumes:
      # Maps the config folder to your persistent storage
      - /mnt/data/dashy:/app/user-data
# --- 7. cAdvisor (Container Metrics Collector) ---
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    # Note: cAdvisor exposes metrics on port 8080 internally

  # --- 8. Prometheus (Metrics Database) ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9091:9090" # Prometheus UI
    volumes:
      # Mount the configuration file created above
      - /mnt/data/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Volume for persistent data storage
      - prometheus_data:/prometheus
    depends_on:
      - cadvisor
    # Define a volume outside the services block at the bottom

  # --- 9. Grafana (Dashboard and Visualization) ---
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000" # Host Port 3001 -> Container Port 3000
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=strongpassword123 # Change this password!
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

# --- VOLUME DEFINITIONS (This is the top-level volumes section) ---
volumes:
  prometheus_data:
  grafana_data:
