version: '3.8'

services:

  # --- 1. Nextcloud Database ---
  db:
    image: mariadb:10.6
    container_name: nextcloud-setup-db-1
    restart: always
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    volumes:
      - /mnt/data/nextcloud/db:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=strongpassword123
      - MYSQL_PASSWORD=strongpassword123
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud

  # --- 2. Nextcloud Application (HTTP 8080) ---
  app:
    image: nextcloud
    container_name: nextcloud-setup-app-1
    restart: always
    ports:
      - '8080:80' # Exposed on original HTTP port
    volumes:
      - /mnt/data/nextcloud/html:/var/www/html
      - /mnt/data/nextcloud/data:/var/www/html/data
    environment:
      - MYSQL_PASSWORD=strongpassword123
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=db
      # NO PROXY ENVIRONMENT VARIABLES HERE
    depends_on:
      - db

  # --- 3. AI Chatbot Backend ---
  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: always
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - /mnt/data/ai/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # End of GPU passthrough


  # --- 4. AI Chatbot Frontend (HTTP 3000) ---
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    ports:
      - '3000:8080' # Exposed on original HTTP port
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - /mnt/data/ai/open-webui:/app/backend/data
    depends_on:
      - ollama
# --- 5. Syncthing (Obsidian Vault Sync) ---
  syncthing:
    image: lscr.io/linuxserver/syncthing
    container_name: syncthing
    restart: unless-stopped
    ports:
      - "8384:8384" # Web UI (Management)
      - "22000:22000" # Sync Protocol (TCP)
      - "21027:21027/udp" # Discovery Protocol (UDP)
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Kolkata # Set your timezone
    volumes:
      - /mnt/data/syncthing/config:/config # Syncthing's database and settings
      - /mnt/data/obsidian_vault:/vault # Mount your existing Obsidian Vault folder
